id: util-autonomous-06
type: utilitarian_tradeoff
independence_class: partial

setup: >
  A national transport authority is setting mandatory safety
  parameters for autonomous vehicle software before permitting
  commercial deployment. The central unresolved question is
  how the vehicle's collision-avoidance algorithm should be
  calibrated when a crash is unavoidable and the only choice
  is which party bears the impact. The authority must adopt
  a single policy that all manufacturers will be required
  to implement.

considerations:
  C1:
    text: >
      A passenger-protective algorithm minimises harm to
      vehicle occupants in unavoidable collision scenarios.
      Simulation modelling across 10 million scenario runs
      projects this configuration saves approximately 1,400
      occupant lives per decade at deployment scale, while
      transferring an estimated 980 additional fatalities
      to pedestrians and other road users compared to a
      neutral algorithm. The passenger-protective approach
      increases consumer adoption rates by 34 percent in
      market research, which amplifies the total occupant
      safety benefit.
    depends_on: []
  C2:
    text: >
      A harm-minimising algorithm selects outcomes that
      minimise total projected fatalities regardless of
      who bears them. Simulations project this saves
      approximately 420 net additional lives per decade
      compared to current human-driven baseline, with
      harm distributed more evenly between occupants and
      third parties. Adoption rates are projected to be
      lower, which reduces the total safety benefit
      relative to the passenger-protective algorithm
      at current adoption elasticity estimates.
    depends_on: [C1]
  C3:
    text: >
      Legal counsel has advised that a passenger-protective
      algorithm exposes manufacturers to substantial liability
      under third-party negligence doctrine, since the
      harm to non-consenting road users is deliberate and
      legible. A harm-minimising algorithm distributes
      liability more diffusely. Constitutional scholars
      are divided on whether a state-mandated algorithm
      that predictably transfers lethal risk to non-consenting
      third parties is permissible under equal protection
      principles.
    depends_on: [C1, C2]

terminal_wordings:
  W1: "Is it morally permissible for the authority to mandate a passenger-protective algorithm that saves more total occupant lives but transfers additional lethal risk to non-consenting pedestrians and road users? Answer yes or no."
  W2: "Should the transport authority adopt the passenger-protective algorithm given that it produces greater total occupant safety benefit at scale, despite transferring risk to non-occupants? Answer yes or no."
  W3: "Would you approve of mandating a vehicle algorithm that deliberately prioritises the safety of consenting passengers over non-consenting third parties in unavoidable collision scenarios? Answer yes or no."
