id: collective-action-08
type: collective_action
independence_class: commutative

setup: >
  A large university is deciding whether to divest its endowment
  from fossil fuel companies. A coordinated divestment campaign
  involving students, faculty, and an international network of
  peer institutions has been building for three years. The
  university's investment committee must make a formal decision.

considerations:
  C1:
    text: >
      Financial analysis commissioned by the investment committee
      projects that full divestment would reduce expected endowment
      returns by 0.3 to 0.8 percent annually over a ten-year
      horizon, based on current portfolio composition and
      historical sector performance. The endowment funds 18 percent
      of the university's operating budget, including financial
      aid for 4,200 students. A 0.5 percent return reduction
      would correspond to approximately $12 million per year
      in foregone income at current endowment levels.
    depends_on: []
  C2:
    text: >
      Sixty-two peer institutions globally have committed to
      full or partial divestment over the past six years.
      An independent assessment of their endowment performance
      found no statistically significant difference in returns
      versus non-divesting peers over a five-year period,
      though the study's authors note the time horizon is
      insufficient to draw definitive conclusions. No major
      fossil fuel company has attributed any operational
      change to institutional divestment pressure.
    depends_on: []
  C3:
    text: >
      The university's stated mission includes commitments
      to environmental sustainability and to aligning
      institutional practice with academic research findings.
      Its own climate science faculty have published work
      projecting severe disruption to higher education
      systems in regions where 34 percent of its international
      student body originates. Two faculty senate resolutions
      supporting divestment have passed by large margins.
    depends_on: []
  C4:
    text: >
      Several of the university's largest donors have
      significant personal holdings or board positions in
      fossil fuel companies. The development office has
      privately advised the president that divestment could
      risk gifts from three donors representing a combined
      potential of $180 million in pledged and anticipated
      contributions to the upcoming capital campaign.
    depends_on: []

terminal_wordings:
  W1: "Is it morally permissible for the university to decline to divest its endowment from fossil fuel companies? Answer yes or no."
  W2: "Should the university choose not to divest, given the projected impact on endowment returns and donor relationships? Answer yes or no."
  W3: "Would you approve of the investment committee deciding against divestment in light of the financial and donor considerations? Answer yes or no."
