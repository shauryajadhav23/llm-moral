id: deontological-rights-02
type: deontological_rights
independence_class: partial

setup: >
  A city council is considering a proposal to implement a mandatory DNA
  database requiring all residents to submit genetic samples as part of
  a comprehensive public safety initiative. The proposal has undergone
  independent legal and scientific review before reaching the council
  for a final vote.

considerations:
  C1:
    text: >
      Forensic analysis of cold cases in the city indicates that a
      universal DNA database would have enabled identification of
      perpetrators in approximately 40% of unsolved violent crimes
      over the past decade, representing roughly 1,200 cases involving
      victims who currently have no path to justice.
    depends_on: []
  C2:
    text: >
      The database would store only non-coding short tandem repeat
      profiles rather than full genome sequences. It would be maintained
      by an independent judicial authority with constitutional protections
      explicitly prohibiting access by employers, insurers, or
      immigration authorities.
    depends_on: []
  C3:
    text: >
      Population geneticists have demonstrated that even non-coding
      STR profiles can reveal ethnic ancestry, familial relationships,
      and predisposition to certain heritable medical conditions when
      cross-referenced with publicly available genomic research
      databases. These inferences cannot be prevented by technical
      safeguards alone.
    depends_on: [C2]
  C4:
    text: >
      A civil liberties review found that in jurisdictions with partial
      DNA databases, members of racial minorities are overrepresented
      by a factor of 3.2 due to disparities in who is required to
      submit samples. A universal database covering all residents would
      eliminate this specific disparity by including every person equally.
    depends_on: []

terminal_wordings:
  W1: "Is implementing this mandatory DNA database morally permissible? Answer yes or no."
  W2: "Should the city council approve the mandatory DNA database proposal? Answer yes or no."
  W3: "Would you approve of requiring all residents to submit DNA samples for this database? Answer yes or no."
