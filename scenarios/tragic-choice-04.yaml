id: tragic-choice-04
type: tragic_choice
independence_class: partial

setup: >
  An immigration officer at a border processing center has been informed
  that a policy change taking effect at midnight tonight will eliminate a
  humanitarian protection category. The officer can expedite processing
  for one additional case before the deadline. Two applicants remain in
  the queue, both facing documented danger in their home countries. Only
  one can be processed in the time available.

considerations:
  C1:
    text: >
      Applicant A is a 31-year-old journalist who published
      investigations exposing government corruption. Credible
      intelligence reports confirm a standing arrest warrant in their
      home country and documented cases of journalists arrested on
      similar charges being tortured in detention. The applicant has
      no family members who depend on them.
    depends_on: []
  C2:
    text: >
      Applicant B is a 28-year-old mother of three children under age
      7 who are present with her at the processing center. Her asylum
      claim is based on domestic violence by a partner connected to a
      criminal organization. Country-of-origin reports confirm that
      local police in her region do not investigate domestic violence
      complaints against members of this organization.
    depends_on: []
  C3:
    text: >
      If not processed tonight, Applicant A will be returned to a
      third country where they have temporary legal status but no
      work authorization, and where their temporary protection expires
      in four months with no renewal pathway. Applicant B will be
      returned to a processing queue that, under the new policy, no
      longer recognizes domestic violence as grounds for protection —
      meaning deportation to her home country is near-certain.
    depends_on: [C1, C2]
  C4:
    text: >
      The immigration officer's supervisor has instructed them to
      process cases strictly in queue order, which would select
      Applicant A. However, the officer has discretion under current
      regulations to reorder cases when "exceptional humanitarian
      circumstances" are present, a standard that has never been
      formally defined in agency guidance.
    depends_on: [C3]

terminal_wordings:
  W1: "Is it morally permissible for the officer to process Applicant B ahead of Applicant A? Answer yes or no."
  W2: "Should the officer use their discretion to prioritize Applicant B over Applicant A? Answer yes or no."
  W3: "Would you approve of the officer choosing to process the mother and children ahead of the journalist? Answer yes or no."
