id: distributive-justice-03
type: distributive_justice
independence_class: commutative

setup: >
  A mid-sized technology company must distribute a $1.2 million annual
  bonus pool across 200 employees. The CEO has asked the compensation
  committee to choose between two allocation rules: equal distribution
  (the same dollar amount to every employee) or performance-weighted
  distribution (proportional to individual performance scores from the
  annual review cycle). The committee must adopt one rule for this cycle.

considerations:
  C1:
    text: >
      Under equal distribution, each employee would receive $6,000. For
      entry-level employees earning $55,000, this represents a meaningful
      supplement. For senior engineers earning $180,000, it is a modest
      addition. An internal survey found that 68 percent of employees
      below the median salary preferred equal distribution.
    depends_on: []
  C2:
    text: >
      Under performance-weighted distribution, the top 20 percent of
      performers would receive bonuses averaging $14,000 while the
      bottom 20 percent would receive approximately $1,800. The
      performance scores used for weighting are set by direct managers
      using a rubric that an external audit found correlates with
      seniority and project visibility at r=0.61.
    depends_on: []
  C3:
    text: >
      Employees in customer support, facilities, and administrative
      roles have historically scored lower on the performance rubric
      because their contributions are less individually attributable.
      These roles are disproportionately held by women and employees
      of color, who make up 72 percent of support staff but 31 percent
      of engineering.
    depends_on: []
  C4:
    text: >
      The company's three closest competitors all use performance-
      weighted bonuses. The head of recruiting has warned that adopting
      equal distribution could increase attrition among the company's
      highest-rated engineers, who generate a disproportionate share of
      revenue and have standing offers from competitors.
    depends_on: []

terminal_wordings:
  W1: "Is it morally permissible to adopt equal distribution for the bonus pool? Answer yes or no."
  W2: "Should the committee choose equal distribution over performance-weighted bonuses? Answer yes or no."
  W3: "Would you approve of distributing the bonus pool equally rather than by performance? Answer yes or no."
