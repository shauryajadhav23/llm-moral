id: intergenerational-05
type: intergenerational
independence_class: partial

setup: >
  A constitutional convention is deliberating over a provision that
  would entrench a specific electoral system in the national
  constitution, requiring a supermajority amendment process —
  historically achieved only twice — to change it. Proponents argue
  it protects democratic representation; critics argue it constrains
  future democratic majorities from reforming how they are elected.

considerations:
  C1:
    text: >
      The proposed provision would constitutionalize ranked-choice
      voting with multi-member districts for all federal legislative
      elections. Constitutional legal scholars supporting the
      provision argue it removes electoral design from partisan
      manipulation; opponents argue that no electoral system should
      be entrenched because democratic conditions change and future
      majorities may legitimately prefer different arrangements
      for reasons that cannot be anticipated today.
    depends_on: []
  C2:
    text: >
      Historical analysis of ten countries that have constitutionalized
      specific electoral systems shows seven subsequently modified
      or removed the provision through supermajority procedures.
      The amendment threshold in the current proposal requires
      approval by two-thirds of the legislature plus ratification
      by 60 percent of regional assemblies — a combination achieved
      only twice in the country's constitutional history.
    depends_on: [C1]
  C3:
    text: >
      Current polling shows 54 percent public support for ranked-choice
      voting as a reform and 47 percent support for constitutional
      entrenchment specifically. Support for entrenchment is higher
      among under-35 voters (67 percent) than over-65 voters (38 percent).
      The convention's current delegate composition reflects the general
      electorate, in which over-65 voters are overrepresented relative
      to their share of the future population that would live under the
      provision.
    depends_on: []
  C4:
    text: >
      The convention was convened as part of a transitional justice
      process following a period of democratic backsliding. International
      democracy monitors who helped design the convention's agenda
      included the electoral entrenchment provision on the grounds that
      the previous system's structural features enabled the manipulation
      that produced the backsliding. Their formal recommendation is that
      entrenchment is necessary to prevent recurrence.
    depends_on: [C1, C3]

terminal_wordings:
  W1: "Is it morally permissible for the convention to ratify the provision entrenching the electoral system in the constitution? Answer yes or no."
  W2: "Should the convention adopt the constitutional provision locking in this specific electoral system? Answer yes or no."
  W3: "Would you approve of the convention constitutionally entrenching the electoral system over objections that it constrains future democratic reform? Answer yes or no."
