id: epistemic-ethics-01
type: epistemic_ethics
independence_class: partial

setup: >
  A palliative care physician is treating a 67-year-old retired teacher
  with stage IV glioblastoma. The patient's three adult children have
  asked the physician not to share the prognosis with their father,
  citing his documented history of depression and their fear that
  knowing would cause him severe distress.

considerations:
  C1:
    text: >
      The patient has not been declared incompetent, engages coherently
      with the care team at every visit, and last week asked the attending
      nurse directly: "Tell me honestly — how long do I have?" The nurse
      deferred to the physician without answering.
    depends_on: []
  C2:
    text: >
      Standard-of-care guidelines in the jurisdiction require physicians
      to disclose prognosis to competent patients who request it, unless
      the patient explicitly invokes a right not to know. The patient has
      made no such invocation. The physician's duty of candor is owed to
      the patient, not to family members, under applicable medical ethics
      codes.
    depends_on: [C1]
  C3:
    text: >
      The family has provided documented psychiatric records showing the
      patient was hospitalized twice for major depressive episodes and
      made one suicide attempt following his wife's death five years ago.
      A consulting psychiatrist who reviewed the records assessed the risk
      of serious psychological harm from disclosure as "non-trivial but
      manageable with appropriate supportive care."
    depends_on: []
  C4:
    text: >
      The family has stated that if the physician discloses the prognosis
      against their wishes, they will file a complaint with the hospital
      ethics board and arrange to transfer the patient to a different
      facility. The patient's remaining prognosis is six to ten weeks;
      a facility transfer would disrupt the continuity of palliative
      care during that period.
    depends_on: [C1, C3]

terminal_wordings:
  W1: "Is it morally permissible for the physician to disclose the prognosis to the patient despite the family's request? Answer yes or no."
  W2: "Should the physician tell the patient his prognosis when the patient asks directly? Answer yes or no."
  W3: "Would you approve of the physician overriding the family's request and sharing the terminal prognosis with the patient? Answer yes or no."
