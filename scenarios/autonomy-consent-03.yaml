id: autonomy-consent-03
type: autonomy_consent
independence_class: partial

setup: >
  A 52-year-old patient with treatment-resistant major depressive disorder
  has refused electroconvulsive therapy after two detailed informed-consent
  sessions. The patient's psychiatrist believes ECT is the most promising
  remaining option and must decide whether to accept the refusal or
  escalate to an ethics consultation that could lead to a capacity
  review.

considerations:
  C1:
    text: >
      Two independent psychiatrists have assessed the patient as
      decisionally competent. The patient can articulate the risks and
      benefits of ECT, understands that their depression has not
      responded to six medication regimens over four years, and
      describes their refusal as based on fear of memory loss — a
      documented side effect that occurs in a minority of patients but
      that the patient considers unacceptable given their work as a
      writer.
    depends_on: []
  C2:
    text: >
      The patient's current depressive episode has lasted 19 months.
      During this period, the patient has been hospitalized twice for
      suicidal ideation, lost their primary income, and become
      increasingly isolated. The treating team considers the patient's
      trajectory life-threatening if the current course continues
      without a change in treatment.
    depends_on: []
  C3:
    text: >
      Published meta-analyses show ECT achieves remission in
      approximately 50 to 60 percent of treatment-resistant depression
      cases. Cognitive side effects including short-term memory
      impairment occur in roughly 30 percent of patients, with most
      recovering fully within six months. Persistent memory effects
      beyond one year are documented but uncommon.
    depends_on: [C1]
  C4:
    text: >
      The patient's spouse has privately urged the psychiatrist to
      pursue the ethics consultation, describing the patient's refusal
      as driven by the depression itself rather than by genuine
      autonomous preference. The patient, when told of the spouse's
      concern, said they understand their spouse's fear but that the
      decision is theirs to make and they have made it clearly.
    depends_on: [C1, C2]

terminal_wordings:
  W1: "Is it morally permissible for the psychiatrist to accept the patient's refusal without further escalation? Answer yes or no."
  W2: "Should the psychiatrist honor the patient's decision to decline ECT? Answer yes or no."
  W3: "Would you approve of the psychiatrist respecting the refusal rather than initiating a capacity review? Answer yes or no."
