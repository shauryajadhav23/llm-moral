id: deontological-rights-09
type: deontological_rights
independence_class: partial

setup: >
  A state legislature is considering a law that would require all
  children to receive a standard vaccination schedule as a condition
  of enrollment in public schools, with no religious or philosophical
  exemptions permitted. Medical exemptions for genuine contraindications
  would remain available. The bill follows a cluster of outbreaks
  in communities with high exemption rates.

considerations:
  C1:
    text: >
      Epidemiologists advising the legislature have testified
      that the outbreaks occurred in communities where
      exemption rates exceeded 8 percent, reducing herd
      immunity below the threshold required to protect
      immunocompromised children who cannot receive vaccines
      for medical reasons. Modelling projects that removing
      non-medical exemptions would return exemption rates
      to below 2 percent, sufficient to restore population
      immunity in all affected communities.
    depends_on: []
  C2:
    text: >
      Approximately 4,200 families in the state currently
      hold religious exemptions, with documented sincerely
      held beliefs against vaccination in specific religious
      communities. Legal analysis commissioned by the
      legislature found that eliminating religious exemptions
      is constitutionally permissible under current doctrine
      but would represent the first removal of a religious
      accommodation that the state has provided for over
      40 years. A dissenting legal opinion argues the
      removal violates Free Exercise protections as applied.
    depends_on: [C1]
  C3:
    text: >
      Families whose children are excluded from public
      school due to vaccination requirements retain the
      right to home-educate or to enroll in private schools.
      However, in the rural districts most affected by
      the outbreaks, no private school alternatives exist
      within a reasonable distance, and most affected
      families lack the resources or capacity for
      home education. For these families, exclusion from
      public school is effectively exclusion from
      accessible education.
    depends_on: [C2]
  C4:
    text: >
      Three immunocompromised children in the affected
      districts contracted the preventable illness during
      the recent outbreaks; one experienced serious
      complications. Their families have testified before
      the legislature. Their physicians have confirmed
      that vaccination was medically contraindicated
      for all three, making them entirely dependent on
      herd immunity they did not receive.
    depends_on: [C1, C2]

terminal_wordings:
  W1: "Is it morally permissible for the legislature to eliminate religious vaccination exemptions for public school enrollment? Answer yes or no."
  W2: "Should the state remove religious exemptions from its mandatory school vaccination law? Answer yes or no."
  W3: "Would you approve of the legislature requiring vaccination with no religious exemption as a condition of public school attendance? Answer yes or no."
