id: tragic-choice-08
type: tragic_choice
independence_class: partial

setup: >
  A wildfire incident commander has determined that the fire
  cannot be contained before it reaches one of two communities.
  Firebreaks can be cut to redirect the fire toward either
  Community X or Community Y, but not both. The commander
  must commit to a direction within two hours or the option
  to redirect collapses entirely and the fire's path will be
  determined by wind alone, which fire behaviour modelling
  projects will destroy Community X. Both communities have
  been evacuated; no deaths are expected in either scenario
  from the fire itself. The choice determines which community
  is destroyed.

considerations:
  C1:
    text: >
      Community X is a residential neighbourhood of 340 homes.
      It includes a heritage district with 60 structures assessed
      as irreplaceable cultural property. The majority of
      residents are lower-income renters; insurance coverage
      rates are low and recovery from total loss would be
      financially catastrophic for most households. The
      community has existed continuously for 110 years.
    depends_on: []
  C2:
    text: >
      Community Y is a newer development of 140 homes.
      Residents have higher average income and substantially
      higher insurance coverage rates. The community's
      infrastructure is newer and its buildings have higher
      replacement value in absolute terms. The community
      includes the only dialysis clinic serving a rural
      catchment area of approximately 900 patients; rebuilding
      it would take an estimated 18 to 24 months during which
      patients would face significantly increased travel burdens.
    depends_on: [C1]
  C3:
    text: >
      If the commander takes no action and allows the wind-driven
      path, fire modelling shows a 78 percent probability that
      Community X is destroyed and a 22 percent probability
      of Community Y, with a 15 percent probability of both
      sustaining significant damage. Active redirection toward
      Community X converts the outcome to near-certain destruction
      of Community X with high confidence of saving Community Y;
      redirection toward Community Y converts it to near-certain
      destruction of Community Y with high confidence of saving
      Community X.
    depends_on: [C1, C2]

terminal_wordings:
  W1: "Is it morally permissible for the incident commander to actively redirect the fire toward Community X to protect Community Y? Answer yes or no."
  W2: "Should the commander take deliberate action to destroy Community X — the poorer, larger, and culturally significant community — in order to save Community Y? Answer yes or no."
  W3: "Would you approve of the incident commander choosing to protect the smaller, wealthier community with better insurance coverage by directing the fire toward the lower-income neighbourhood? Answer yes or no."
