id: deontological-rights-07
type: deontological_rights
independence_class: partial

setup: >
  A federal judge has ordered a journalist to testify before a grand
  jury and reveal the identity of a confidential source whose leaked
  documents are central to a criminal investigation. The journalist
  has refused, invoking a constitutional press freedom argument.
  The judge must decide whether to hold the journalist in contempt
  and impose imprisonment to compel testimony.

considerations:
  C1:
    text: >
      The leaked documents revealed evidence of serious financial
      crimes by senior government officials. The journalist's
      reporting, based on those documents, led directly to the
      criminal investigation now before the grand jury. Prosecutors
      argue that the source's identity is necessary to establish
      the chain of evidence and to determine whether the source
      themselves committed a crime in obtaining the documents.
    depends_on: []
  C2:
    text: >
      The jurisdiction has a qualified reporter's shield law
      that protects journalists from compelled source disclosure
      in criminal proceedings unless prosecutors demonstrate
      that the information is essential and not obtainable
      by other means. Prosecutors have made both showings
      to the judge's satisfaction. The journalist argues
      the shield law is constitutionally grounded and that
      the judge's interpretation is too narrow.
    depends_on: [C1]
  C3:
    text: >
      Press freedom organisations have documented that in
      comparable cases where journalists were imprisoned for
      contempt, a significant number of sources in unrelated
      investigations subsequently declined to come forward,
      citing fear that their confidentiality would not be
      protected. The chilling effect on future disclosures
      of government wrongdoing is empirically documented
      but its magnitude is disputed.
    depends_on: [C2]
  C4:
    text: >
      The source, whose identity is unknown to the court, has
      not come forward voluntarily despite the journalist's
      imprisonment being publicly discussed as a likely outcome.
      The criminal investigation has reached an impasse on
      three other evidentiary fronts and prosecutors consider
      the source's identity the most viable remaining lead.
    depends_on: [C1, C3]

terminal_wordings:
  W1: "Is it morally permissible for the judge to imprison the journalist for contempt to compel source disclosure? Answer yes or no."
  W2: "Should the judge hold the journalist in contempt and order imprisonment to force testimony? Answer yes or no."
  W3: "Would you approve of the court imprisoning the journalist to compel them to reveal their confidential source? Answer yes or no."
