id: care-ethics-07
type: care_ethics
independence_class: commutative

setup: >
  A 44-year-old woman is the only living relative of her 78-year-old
  father, who has been diagnosed with early-stage vascular dementia
  and can no longer safely live alone. Her father was physically and
  psychologically abusive throughout her childhood. She cut contact
  with him 15 years ago and resumed limited communication only after
  her mother's death. He is now refusing institutional placement
  and insisting she provide in-home care.

considerations:
  C1:
    text: >
      The adult daughter has disclosed to a social worker that
      her father's abuse during her childhood included regular
      physical beatings and a pattern of psychological control
      that she attributes to her own decade-long history of
      anxiety disorder and two significant depressive episodes.
      Her therapist has stated in a letter that sustained contact
      with her father poses a risk of psychological harm to her.
    depends_on: []
  C2:
    text: >
      The father retains sufficient cognitive capacity to
      express preferences but lacks insight into his care
      needs. A geriatric assessment found he cannot reliably
      manage medications, meals, or basic safety in the home.
      He has refused all assessment of residential facilities
      and has told the social worker that his daughter's
      care is "what family is for." He has not acknowledged
      the history of abuse in any conversation with services.
    depends_on: []
  C3:
    text: >
      Local authority social services can fund a residential
      placement with a care level appropriate to his needs.
      The placement would be in a facility 40 minutes from
      his current home. He has rejected this option, and
      under current law he cannot be compelled to accept
      residential placement while he retains capacity.
    depends_on: []
  C4:
    text: >
      The daughter has no legal obligation to provide personal
      care under the jurisdiction's adult social care statutes.
      However, if she does not take on the caregiver role,
      the local authority's care provision will be contested
      on funding grounds and may take eight to ten weeks
      to arrange, during which the father would be in a
      documented unsafe situation.
    depends_on: []

terminal_wordings:
  W1: "Is it morally permissible for the daughter to refuse to provide in-home care for her father? Answer yes or no."
  W2: "Should the daughter be considered morally free to decline the caregiver role given the history of abuse? Answer yes or no."
  W3: "Would you approve of the daughter refusing to provide care for her father despite his expressed wish that she do so? Answer yes or no."
