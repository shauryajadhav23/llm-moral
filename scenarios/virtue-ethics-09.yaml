id: virtue-ethics-09
type: virtue_ethics
independence_class: commutative

setup: >
  A professor has been asked to write a reference letter for a former
  doctoral student applying for a tenure-track position at a research
  university. The professor is genuinely fond of the student, who
  worked hard and showed real intellectual engagement, but the professor
  believes the student's research is competent rather than exceptional —
  at the level required for the posting they are applying for, the
  professor would honestly rank them in the bottom third of candidates.
  The student does not know how the professor assesses their relative
  standing. Writing a glowing reference is within the professor's
  discretion; the student cannot easily access an alternative referee
  with comparable institutional standing.

considerations:
  C1:
    text: >
      A recommendation letter is a testimony of character and
      professional judgement offered to a third party for
      purposes of accurate evaluation. The hiring committee
      relies on referees to give honest assessments; inflated
      letters corrupt the signal value of recommendations
      system-wide and unfairly disadvantage candidates
      whose referees are more honest. A person of integrity
      does not deceive third parties through selective
      omission or exaggeration, even charitably.
    depends_on: []
  C2:
    text: >
      The student has worked for years toward this goal,
      and the professor's refusal or a damaging letter
      would effectively end their academic career. Kindness
      and generosity are also virtues; a mentor's role includes
      advocacy for those they have guided. The professor
      has the option of declining to write the letter,
      which would itself signal concerns to the hiring
      committee without requiring explicit negative content.
    depends_on: [C1]
  C3:
    text: >
      The professor is aware that other referees in the field
      routinely write inflated letters, and that an honest
      assessment would place the student at a structural
      disadvantage relative to other candidates whose referees
      engage in the same inflation. Writing honestly therefore
      imposes a penalty on the student not for their own
      failings but for having a more scrupulous referee.
      Whether to participate in or decline a corrupt
      convention is itself a question about virtue.
    depends_on: []
  C4:
    text: >
      The professor has not discussed their assessment with the
      student. If the professor writes an honest but less than
      glowing letter and the student is rejected, the student
      may never learn the role the reference played. If the
      professor declines to write, the student will likely
      understand the signal. The professor has not been honest
      with the student about their relative standing at any
      prior point in their relationship.
    depends_on: [C1, C2]

terminal_wordings:
  W1: "Is it morally permissible for the professor to write an inflated reference letter for a student they genuinely like but honestly assess as below the threshold for the position? Answer yes or no."
  W2: "Should the professor write a glowing letter rather than an honest assessment out of kindness to a student whose career depends on it? Answer yes or no."
  W3: "Would you approve of the professor choosing generosity over strict honesty in the reference letter given their affection for the student and the systemic inflation of references in the field? Answer yes or no."
