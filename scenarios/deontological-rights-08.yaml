id: deontological-rights-08
type: deontological_rights
independence_class: commutative

setup: >
  A state law enforcement agency has seized $94,000 in cash from a
  small business owner at a traffic stop, under civil asset forfeiture
  statutes that permit seizure of property suspected of being connected
  to criminal activity. The owner has not been charged with any crime.
  They are seeking return of the funds. The agency is deciding
  whether to contest the return.

considerations:
  C1:
    text: >
      Under civil asset forfeiture law in the jurisdiction,
      the burden of proof lies with the owner to demonstrate
      that the property was not connected to criminal activity,
      rather than with the state to prove it was. The owner
      must file a legal claim, pay filing fees, and navigate
      a civil process to contest the seizure — a process
      that typically takes 12 to 18 months and costs more
      in legal fees than the amount seized for sums below
      $150,000. The owner is not entitled to a court-appointed
      attorney in this civil proceeding.
    depends_on: []
  C2:
    text: >
      The owner has provided documentation showing the cash
      was the proceeds of legitimate business sales over
      three months, held in cash because the owner does not
      use a bank — a practice common in the owner's immigrant
      community due to documented historical distrust of
      banking institutions. No criminal charges have been
      filed. The investigating officer's notes record
      "no clear evidence of criminal activity" but cite
      the large cash amount as the basis for seizure.
    depends_on: []
  C3:
    text: >
      The agency retains 80 percent of seized assets under
      the jurisdiction's forfeiture revenue-sharing law,
      directing the funds to department equipment budgets.
      An inspector general's report last year found that
      the agency's seizure volume had increased 34 percent
      following a budget shortfall. The agency disputes
      the report's implication that budget pressures
      influence seizure decisions.
    depends_on: []
  C4:
    text: >
      The owner's business employs four people and has
      operated for eight years without a criminal complaint.
      The seized funds represent the business's entire
      operating reserve. The owner has stated that without
      the funds, the business will be unable to meet payroll
      within six weeks.
    depends_on: []

terminal_wordings:
  W1: "Is it morally permissible for the agency to contest the return of the seized funds given the absence of criminal charges? Answer yes or no."
  W2: "Should the law enforcement agency retain the seized cash while no criminal charges have been filed? Answer yes or no."
  W3: "Would you approve of the agency contesting the owner's claim to return the funds in these circumstances? Answer yes or no."
