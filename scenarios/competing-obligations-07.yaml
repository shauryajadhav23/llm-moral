id: competing-obligations-07
type: competing_obligations
independence_class: partial

setup: >
  A military physician deployed with a combat unit has been providing
  medical care to wounded enemy combatants held at a forward operating
  base, as required by the Geneva Conventions and the physician's
  military medical oath. The unit's commanding officer has issued
  a direct order to cease treating combatant detainees and prioritise
  the unit's own casualties, citing critical medical supply constraints.

considerations:
  C1:
    text: >
      The Geneva Conventions, ratified by the physician's country,
      require medical personnel to provide care to wounded combatants
      without adverse distinction. The physician's military commission
      explicitly incorporates these obligations and the physician
      swore an oath to provide care regardless of nationality or
      combatant status. Violation of Geneva obligations constitutes
      a war crime under both international and domestic military law.
    depends_on: []
  C2:
    text: >
      The commanding officer's order is issued within a context
      of documented supply shortage: the unit has one remaining
      unit of O-negative blood and limited surgical materials.
      Three members of the unit have non-critical but worsening
      wounds that will become life-threatening without treatment
      within hours. Two enemy combatants currently receiving
      care are in serious but stable condition.
    depends_on: [C1]
  C3:
    text: >
      Military law requires soldiers to follow lawful orders from
      superior officers. However, military law in the physician's
      jurisdiction also provides that orders requiring violation
      of the laws of armed conflict are unlawful orders that
      must not be obeyed. The physician has not been able to
      reach the Judge Advocate General's office in time to
      seek formal guidance before the decision is required.
    depends_on: [C1, C2]
  C4:
    text: >
      If the physician refuses the order, they face a formal
      insubordination charge. If they comply and the combatants
      die from untreated wounds, they face potential war crimes
      liability. The commanding officer has stated they will
      accept personal responsibility for the order in writing,
      though legal counsel has advised the physician that a
      written order from a superior does not constitute a
      defense to war crimes liability under applicable law.
    depends_on: [C2, C3]

terminal_wordings:
  W1: "Is it morally permissible for the physician to comply with the commanding officer's order and cease treating the enemy combatants? Answer yes or no."
  W2: "Should the physician follow the order to stop treating the wounded combatants and redirect care to unit personnel? Answer yes or no."
  W3: "Would you approve of the physician obeying the commanding officer's directive in these circumstances? Answer yes or no."
