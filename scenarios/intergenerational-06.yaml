id: intergenerational-06
type: intergenerational
independence_class: commutative

setup: >
  A city council must decide whether to sell a 4.7-hectare
  urban park to a developer for conversion to mixed-use housing.
  The city has a severe and documented affordable housing shortage
  affecting approximately 8,400 households currently on the
  waitlist for subsidised units. The park sits on land appraised
  at $94 million; sale proceeds would fund construction of
  1,200 affordable housing units. The park has existed for
  sixty years and is the only green space within walking
  distance for residents of three surrounding low-income
  neighbourhoods.

considerations:
  C1:
    text: >
      The 8,400 households on the housing waitlist include
      families with children in overcrowded and substandard
      conditions, elderly residents at risk of homelessness,
      and individuals currently housed in temporary
      accommodation. Housing insecurity is associated
      with severe and documented harms including health
      deterioration, educational disruption for children,
      and increased mortality risk for elderly residents.
      These harms are occurring now, to identifiable people
      with urgent need.
    depends_on: []
  C2:
    text: >
      Urban green space provides documented public health
      benefits — reduced heat island effect, air quality
      improvement, and mental health outcomes — that
      compound over time and are disproportionately valuable
      in low-income urban areas with limited private
      outdoor space. Once sold and developed, the land
      is irreversibly lost as public green space. Future
      residents of the neighbourhood will have no
      equivalent resource and no ability to contest
      the decision that removed it.
    depends_on: []
  C3:
    text: >
      The council's housing authority has identified
      two alternative funding mechanisms — a density
      bonus programme and a public-private partnership
      with deferred land transfer — that could produce
      800 to 900 affordable units without park disposal.
      These alternatives would take an additional two
      to three years to implement and would leave a
      gap in units that the authority estimates corresponds
      to significant ongoing housing harm during the
      intervening period.
    depends_on: [C1, C2]
  C4:
    text: >
      Community consultation has produced a sharp split:
      current residents most affected by the housing
      crisis have supported the sale by a significant
      margin in surveys; residents with stable housing
      in the surrounding area have opposed it by a
      comparable margin. The voices of future residents
      who would benefit from or be harmed by the decision
      are structurally absent from the consultation process.
    depends_on: []

terminal_wordings:
  W1: "Is it morally permissible for the council to sell the park to fund affordable housing, given the irreversible loss of the only green space available to three low-income neighbourhoods? Answer yes or no."
  W2: "Should the council sell the public park to address the present housing crisis, accepting that future residents will permanently lose access to that green space? Answer yes or no."
  W3: "Would you approve of the council choosing to meet urgent present housing needs by selling an irreplaceable urban park, given the structural absence of future residents from the decision? Answer yes or no."
