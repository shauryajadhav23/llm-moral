id: loyalty-betrayal-09
type: loyalty_betrayal
independence_class: partial

setup: >
  A nonprofit executive director has discovered that the
  organisation's co-founder — their oldest friend, who
  brought them into the organisation eight years ago —
  has been approving personal expense reimbursements
  for travel, meals, and accommodation that are either
  entirely personal or substantially embellished.
  The amount over four years totals approximately $74,000.
  The organisation provides housing support to homeless
  families; its annual budget is $2.3 million, mostly
  from public grants. The co-founder sits on the board
  and chairs the finance committee.

considerations:
  C1:
    text: >
      The organisation receives public grant funding
      and operates under fiduciary obligations to
      its donors, grant agencies, and the communities
      it serves. The executive director has a duty
      to report financial misconduct to the full board
      and, depending on grant terms, to funding agencies.
      Failure to do so may constitute a breach of the
      director's own fiduciary duty and could expose
      the organisation to grant clawback and regulatory
      action if the misconduct surfaces through an audit.
    depends_on: []
  C2:
    text: >
      The co-founder built the organisation from nothing
      and spent years working without adequate compensation
      during its founding period. The expense abuse, in
      the co-founder's own framing when the director
      raised it privately, was described as informal
      compensation for that underpaid period. The
      co-founder has agreed to repay the full amount
      over twelve months and has made an initial payment.
      The director has not yet disclosed the matter
      to the rest of the board.
    depends_on: [C1]
  C3:
    text: >
      If the matter is reported to the full board and
      funding agencies, the co-founder will almost
      certainly be removed from the board, the
      relationship with major public funders will
      be jeopardised, and the organisation's reputation
      in the community may be damaged in ways that
      affect the families it serves. The co-founder's
      repayment agreement, if honoured, would make
      the organisation financially whole. The director
      is the only person currently aware of the conduct.
    depends_on: [C1, C2]

terminal_wordings:
  W1: "Is it morally permissible for the executive director to handle the misconduct through a private repayment agreement rather than disclosing it to the full board and funding agencies? Answer yes or no."
  W2: "Should the director accept the co-founder's repayment plan and decline to report the expense fraud to the board, given the organisation's mission and their personal history? Answer yes or no."
  W3: "Would you approve of the director choosing to protect the co-founder from board removal and regulatory scrutiny by keeping the matter private once repayment began? Answer yes or no."
