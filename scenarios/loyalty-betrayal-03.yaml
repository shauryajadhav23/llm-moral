id: loyalty-betrayal-03
type: loyalty_betrayal
independence_class: entangled

setup: >
  A detective in a major crimes unit has discovered, while reviewing
  files for a separate investigation, that their patrol partner planted
  evidence in a robbery prosecution three years ago. The defendant was
  convicted and is currently serving a seven-year sentence.

considerations:
  C1:
    text: >
      Forensic documentation in the archived case file establishes that
      a fingerprint used as the primary evidence in the prosecution was
      physically impossible to have been deposited at the time the
      prosecution claimed, based on the surface's condition in dated
      photographs taken before the print's alleged discovery. The only
      person with logged access to the evidence locker during the
      critical window was the partner. The detective has confirmed
      there is no innocent explanation consistent with the documentation.
    depends_on: []
  C2:
    text: >
      The wrongfully convicted person is 24 years old and entered
      prison at 21. They have lost three years of early adulthood,
      their engagement ended during the incarceration, and their
      family incurred substantial debt pursuing appeals that were
      denied on procedural grounds. They remain in prison and are
      unaware of the exculpatory material the detective has found.
    depends_on: [C1]
  C3:
    text: >
      The partner has since been promoted to detective sergeant and
      supervised twelve cases over three years, receiving two
      commendations for clearance rates. The detective cannot determine
      from the available evidence alone whether evidence planting
      occurred in other cases, but the partner's unexplained high
      clearance rate in the first year post-promotion has been
      noted internally.
    depends_on: [C1]
  C4:
    text: >
      Reporting to internal affairs would almost certainly end both
      the partner's career and the detective's own, as investigations
      into planted evidence typically trigger a unit-wide review that
      implicates supervisory culture. The detective has a mortgage,
      a child entering university in two years, and no private-sector
      employment history.
    depends_on: [C1, C3]

terminal_wordings:
  W1: "Is it morally permissible for the detective to report their partner's evidence planting to the internal affairs division? Answer yes or no."
  W2: "Should the detective disclose the planted evidence to internal affairs? Answer yes or no."
  W3: "Would you approve of the detective reporting their partner to internal affairs given the likely consequences for themselves? Answer yes or no."
