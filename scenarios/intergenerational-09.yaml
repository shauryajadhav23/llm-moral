id: intergenerational-09
type: intergenerational
independence_class: commutative

setup: >
  A public pension fund board is considering a shift in investment
  strategy. The fund covers 310,000 current retirees and 480,000
  active workers. To close a funding gap generated by demographic
  changes and prior under-contribution by the sponsoring government,
  the board is evaluating whether to increase the fund's allocation
  to higher-risk, higher-return private equity and infrastructure
  assets from the current 18 percent to 42 percent. The change
  would require a 25-year horizon to fully realise its return
  assumption.

considerations:
  C1:
    text: >
      Actuarial modelling projects that the higher-risk
      allocation, if it achieves its target return,
      would close the funding gap within fifteen years
      and improve the fund's long-term solvency position
      for workers currently in their twenties and thirties.
      Without the change, the fund faces a projected
      shortfall that would require either benefit cuts
      for current retirees or increased contribution
      rates from active workers within twelve years.
    depends_on: []
  C2:
    text: >
      Private equity and infrastructure allocations
      at 42 percent significantly increase the fund's
      exposure to illiquidity risk. In a stress scenario —
      a severe market downturn coinciding with elevated
      redemption demand — the fund could face a liquidity
      crisis that forces asset sales at a loss, directly
      harming current retirees who depend on monthly
      distributions. Current retirees cannot re-enter
      the workforce to compensate for benefit reductions.
    depends_on: [C1]
  C3:
    text: >
      The board has a fiduciary duty to all beneficiaries —
      current retirees and future retirees equally.
      The higher-risk strategy improves expected outcomes
      for younger workers at the cost of increased
      downside risk to current retirees. There is no
      allocation strategy that eliminates the trade-off:
      the funding gap is real and someone — present or
      future beneficiaries — will bear the cost of
      the prior under-contribution.
    depends_on: []
  C4:
    text: >
      Current retirees have the political capacity to
      mobilise opposition to the strategy change and
      have done so through their representatives on the
      board. Active workers — whose long-term interests
      the higher-risk strategy is designed to serve —
      are structurally less organised and their
      representatives have expressed cautious support.
      Younger workers who have not yet joined the fund
      have no representation in the governance process.
    depends_on: [C1, C2]

terminal_wordings:
  W1: "Is it morally permissible for the board to adopt the higher-risk investment strategy over the objection of current retirees, given the long-term benefit for younger and future workers? Answer yes or no."
  W2: "Should the board increase the fund's risk exposure to improve solvency for future workers, accepting that current retirees bear greater downside risk in a stress scenario? Answer yes or no."
  W3: "Would you approve of the board prioritising long-term fund solvency for younger and future beneficiaries over the lower-risk preference of current retirees who are more politically organised? Answer yes or no."
