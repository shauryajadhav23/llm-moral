id: collective-action-09
type: collective_action
independence_class: partial

setup: >
  A group of workers at a distribution warehouse are deciding whether
  to participate in a one-day wildcat strike — a work stoppage not
  authorised by their union — to protest the dismissal of a popular
  colleague they believe was fired for raising safety concerns.
  The official union has declined to endorse the action and has warned
  that participation could expose workers to disciplinary consequences.

considerations:
  C1:
    text: >
      The dismissed colleague documented multiple safety
      violations in the warehouse over eight months and submitted
      formal complaints through the company's internal reporting
      channel. Their dismissal was framed by management as a
      performance issue, but three coworkers have submitted
      written statements to the union asserting that the
      colleague's performance reviews were uniformly positive
      before the safety complaints began and declined only
      after they were filed.
    depends_on: []
  C2:
    text: >
      The company has informed workers that participants in
      an unauthorised work stoppage will be subject to
      formal disciplinary proceedings, up to and including
      dismissal. The warehouse employs workers on
      short-term rolling contracts with no severance
      entitlement. Many workers have financial obligations —
      including mortgages and family dependants — that make
      job loss immediately serious. Only some workers
      have indicated willingness to participate.
    depends_on: [C1]
  C3:
    text: >
      Collective action is only effective if a sufficient
      number of workers participate. Organisers estimate
      a threshold of 60 percent participation is needed
      to disrupt operations meaningfully. If fewer than
      60 percent participate, those who do will bear the
      disciplinary risk without achieving the intended
      effect, while those who did not participate face
      no consequences and benefit from any outcome the
      action achieves.
    depends_on: [C2]
  C4:
    text: >
      The union's formal position is that grievances should
      be pursued through its authorised dispute process,
      which has a typical resolution timeline of four to
      six months. Workers familiar with the process note
      that outcomes have rarely included reinstatement
      in comparable cases, and that extended timelines
      have in previous instances led to the underlying
      safety issues going unaddressed during the dispute period.
    depends_on: [C1, C3]

terminal_wordings:
  W1: "Is it morally permissible for individual workers to participate in the wildcat strike despite the personal risk and the union's non-endorsement? Answer yes or no."
  W2: "Should a worker join the unauthorised work stoppage to support their dismissed colleague? Answer yes or no."
  W3: "Would you approve of a worker participating in the wildcat strike given the disciplinary risk and the union's official position against it? Answer yes or no."
